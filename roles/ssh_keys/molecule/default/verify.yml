---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Resolve testuser home directory
      ansible.builtin.command: getent passwd testuser
      register: ssh_keys_verify_getent
      changed_when: false

    - name: Set ssh_keys_verify_home fact
      ansible.builtin.set_fact:
        ssh_keys_verify_home: "{{ ssh_keys_verify_getent.stdout.split(':')[5] }}"

    - name: Stat .ssh directory
      ansible.builtin.stat:
        path: "{{ ssh_keys_verify_home }}/.ssh"
      register: ssh_keys_verify_dir

    - name: Assert .ssh directory exists with correct mode and owner
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_dir.stat.exists
          - ssh_keys_verify_dir.stat.mode == '0700'
          - ssh_keys_verify_dir.stat.pw_name == 'testuser'

    - name: Stat private key (full pair)
      ansible.builtin.stat:
        path: "{{ ssh_keys_verify_home }}/.ssh/id_test_full"
      register: ssh_keys_verify_priv_full

    - name: Assert private key exists with correct mode and owner
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_priv_full.stat.exists
          - ssh_keys_verify_priv_full.stat.mode == '0600'
          - ssh_keys_verify_priv_full.stat.pw_name == 'testuser'

    - name: Stat public key (full pair)
      ansible.builtin.stat:
        path: "{{ ssh_keys_verify_home }}/.ssh/id_test_full.pub"
      register: ssh_keys_verify_pub_full

    - name: Assert public key exists with correct mode and owner
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_pub_full.stat.exists
          - ssh_keys_verify_pub_full.stat.mode == '0644'
          - ssh_keys_verify_pub_full.stat.pw_name == 'testuser'

    - name: Stat private key (no-pub pair)
      ansible.builtin.stat:
        path: "{{ ssh_keys_verify_home }}/.ssh/id_test_nopub"
      register: ssh_keys_verify_priv_nopub

    - name: Assert private key (no-pub) exists with correct mode and owner
      ansible.builtin.assert:
        that:
          - ssh_keys_verify_priv_nopub.stat.exists
          - ssh_keys_verify_priv_nopub.stat.mode == '0600'
          - ssh_keys_verify_priv_nopub.stat.pw_name == 'testuser'

    - name: Stat absent public key (no-pub pair)
      ansible.builtin.stat:
        path: "{{ ssh_keys_verify_home }}/.ssh/id_test_nopub.pub"
      register: ssh_keys_verify_pub_nopub

    - name: Assert missing public key was not deployed
      ansible.builtin.assert:
        that: not ssh_keys_verify_pub_nopub.stat.exists

    - name: Slurp private key content
      ansible.builtin.slurp:
        src: "{{ ssh_keys_verify_home }}/.ssh/id_test_full"
      register: ssh_keys_verify_content
      no_log: true

    - name: Assert private key content matches source fixture
      ansible.builtin.assert:
        that: "'DUMMY PRIVATE KEY CONTENT' in (ssh_keys_verify_content.content | b64decode)"
      no_log: true
