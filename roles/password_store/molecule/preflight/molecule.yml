---
# Security: no host volumes containing user data are mounted.
# ~/.gnupg and ~/.password-store on the developer machine are
# never accessible from any container. All GPG keys and password
# store data used in tests are generated inside the controller
# container during prepare.yml.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: controller
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
  - name: debian12
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
  - name: archlinux
    image: archlinux:latest
    dockerfile: Dockerfile-archlinux.j2
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: /usr/lib/systemd/systemd
provisioner:
  name: ansible
  env:
    ANSIBLE_GALAXY_DISABLE_GPG_VERIFY: "true"
verifier:
  name: ansible
lint: |
  set -e
  yamllint .
  ansible-lint
