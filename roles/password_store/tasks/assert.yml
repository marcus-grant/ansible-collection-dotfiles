---
- name: Assert password_store_owner is defined and non-empty
  ansible.builtin.assert:
    that: password_store_owner | length > 0
    fail_msg: "password_store_owner is required"

- name: Assert password_store_repo is defined and non-empty
  ansible.builtin.assert:
    that: password_store_repo | length > 0
    fail_msg: "password_store_repo is required"

- name: Resolve home directory for password_store_owner
  ansible.builtin.command: "getent passwd {{ password_store_owner }}"
  register: _password_store_getent
  changed_when: false

- name: Set _password_store_home fact
  ansible.builtin.set_fact:
    _password_store_home: "{{ _password_store_getent.stdout.split(':')[5] }}"

- name: Set _password_store_dir_abs fact
  ansible.builtin.set_fact:
    _password_store_dir_abs: "{{ password_store_dir | replace('~', _password_store_home) }}"

- name: Set _password_store_needs_symlink fact
  ansible.builtin.set_fact:
    _password_store_needs_symlink: >-
      {{ (_password_store_dir_abs != _password_store_home ~ '/.password-store'
          and not password_store_profile_dropin) | bool }}

- name: Validate profile dropin directory when dropin is enabled
  when: password_store_profile_dropin
  block:
    - name: Assert password_store_profile_dropin_dir is non-empty
      ansible.builtin.assert:
        that: password_store_profile_dropin_dir | length > 0
        fail_msg: "password_store_profile_dropin_dir is required when password_store_profile_dropin is true"

    - name: Set _password_store_profile_dropin_dir_abs fact
      ansible.builtin.set_fact:
        _password_store_profile_dropin_dir_abs: >-
          {{ password_store_profile_dropin_dir | replace('~', _password_store_home) }}

    - name: Stat profile dropin directory
      ansible.builtin.stat:
        path: "{{ _password_store_profile_dropin_dir_abs }}"
      register: _dropin_dir_stat

    - name: Assert profile dropin directory exists
      ansible.builtin.assert:
        that:
          - _dropin_dir_stat.stat.exists
          - _dropin_dir_stat.stat.isdir
        fail_msg: >-
          password_store_profile_dropin_dir '{{ _password_store_profile_dropin_dir_abs }}'
          does not exist on target
