---
# SPDX-License-Identifier: GPL-3.0-only
# tasks file for nvm

- name: Update package cache
  ansible.builtin.package:
    update_cache: true
  changed_when: false

- name: Install git for NVM installation
  ansible.builtin.package:
    name: git
    state: present

- name: Set NVM installation directory
  ansible.builtin.set_fact:
    _nvm_dir: >-
      {%- if nvm_dir -%}
        {{ nvm_dir }}
      {%- elif nvm_xdg_compliant and ansible_env.XDG_DATA_HOME is defined -%}
        {{ ansible_env.XDG_DATA_HOME }}/nvm
      {%- else -%}
        {{ ansible_env.HOME }}/.nvm
      {%- endif -%}


- name: Clone NVM repository
  ansible.builtin.git:
    repo: https://github.com/nvm-sh/nvm.git
    dest: "{{ _nvm_dir }}"
    version: "{{ nvm_version }}"
    recursive: false

- name: Install Node.js versions
  ansible.builtin.shell: |
    export NVM_DIR="{{ _nvm_dir }}"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install {{ item }}
  args:
    executable: /bin/bash
    creates: "{{ _nvm_dir }}/versions/node/v{{ item }}"
  loop: "{{ nvm_node_versions }}"
  when: nvm_node_versions | length > 0

- name: Set default Node.js version
  ansible.builtin.shell: |
    export NVM_DIR="{{ _nvm_dir }}"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm alias default {{ nvm_default_version }}
  args:
    executable: /bin/bash
  when: nvm_default_version | length > 0
  changed_when: true

- name: Configure NVM shell environment
  ansible.builtin.template:
    src: nvm-env.sh.j2
    dest: "{{ profile_d_path | default('/etc/profile.d') }}/20-nvm.sh"
    mode: '0644'
  when: nvm_configure_shell | default(true)
