---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    # fedora - default behavior tests
    - name: Check default NVM directory on fedora
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.nvm"
      register: default_nvm_dir
      when: inventory_hostname == "fedora"
    - name: Verify default NVM directory exists on fedora
      ansible.builtin.assert:
        that:
          - default_nvm_dir.stat.exists
          - default_nvm_dir.stat.isdir
        fail_msg: "Default NVM directory {{ ansible_env.HOME }}/.nvm does not exist"
      when: inventory_hostname == "fedora"

    # debian12 - XDG compliance tests
    - name: Check XDG NVM directory on debian12
      ansible.builtin.stat:
        path: "/tmp/xdg-data/nvm"
      register: xdg_nvm_dir
      when: inventory_hostname == "debian12"
    - name: Verify XDG NVM directory exists on debian12
      ansible.builtin.assert:
        that:
          - xdg_nvm_dir.stat.exists
          - xdg_nvm_dir.stat.isdir
        fail_msg: "XDG NVM directory /tmp/xdg-data/nvm does not exist"
      when: inventory_hostname == "debian12"

    # debian-sid - explicit directories tests
    - name: Check explicit NVM directory on debian-sid
      ansible.builtin.stat:
        path: "/opt/nvm"
      register: explicit_nvm_dir
      when: inventory_hostname == "debian-sid"
    - name: Verify explicit NVM directory exists on debian-sid
      ansible.builtin.assert:
        that:
          - explicit_nvm_dir.stat.exists
          - explicit_nvm_dir.stat.isdir
        fail_msg: "Explicit NVM directory /opt/nvm does not exist"
      when: inventory_hostname == "debian-sid"

    # archlinux - test XDG with explicit NVM directory override
    - name: Check explicit NVM directory on archlinux
      ansible.builtin.stat:
        path: "/opt/nvm"
      register: arch_explicit_nvm
      when: inventory_hostname == "archlinux"
    - name: Verify explicit NVM directory exists on archlinux
      ansible.builtin.assert:
        that:
          - arch_explicit_nvm.stat.exists
          - arch_explicit_nvm.stat.isdir
        fail_msg: "Explicit NVM directory /opt/nvm does not exist"
      when: inventory_hostname == "archlinux"

    # Profile.d integration tests
    - name: Verify profile.d role dependency is working
      ansible.builtin.stat:
        path: "{{ profile_d_path | default('/etc/profile.d') }}"
      register: profile_d_dir

    - name: Assert profile.d directory exists
      ansible.builtin.assert:
        that:
          - profile_d_dir.stat.exists
          - profile_d_dir.stat.isdir
        fail_msg: "Profile.d directory does not exist - dependency not working"

    # Phase 2.1: Test for NVM profile.d file creation
    - name: Check NVM profile.d file exists
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.config/profile.d/20-nvm.sh"
      register: nvm_profile_file
      when: nvm_configure_shell | default(true)

    - name: Verify NVM profile.d file exists
      ansible.builtin.assert:
        that:
          - nvm_profile_file.stat.exists
          - nvm_profile_file.stat.mode == '0644'
        fail_msg: "NVM profile.d file does not exist or has wrong permissions"
      when: nvm_configure_shell | default(true)
