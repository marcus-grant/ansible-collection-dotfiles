---
- name: Prepare target hosts
  hosts: all
  gather_facts: true
  become: true
  become_user: root
  tasks:
    - name: Update apt cache on Debian family
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install openssh-client (Debian)
      ansible.builtin.apt:
        name: openssh-client
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install openssh (Arch)
      community.general.pacman:
        name: openssh
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Create testuser with home directory
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true

    - name: Ensure testuser .ssh directory exists
      ansible.builtin.file:
        path: /home/testuser/.ssh
        state: directory
        mode: '0700'
        owner: testuser
        group: testuser

    - name: Generate id_ed25519 keypair for testuser
      become_user: testuser
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N '' -f /home/testuser/.ssh/id_ed25519
        creates: /home/testuser/.ssh/id_ed25519

    - name: Generate id_custom keypair for testuser
      become_user: testuser
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N '' -f /home/testuser/.ssh/id_custom
        creates: /home/testuser/.ssh/id_custom

    - name: Create .ssh dir at explicit-home-test path for home override test
      ansible.builtin.file:
        path: /tmp/explicit-home-test/.ssh
        state: directory
        mode: '0700'
        owner: testuser
        group: testuser
