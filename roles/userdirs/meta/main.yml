---
galaxy_info:
  role_name: userdirs
  author: marcus_grant
  description: A role to ensure user directories exist
  issue_tracker_url: https://github.com/marcus-grant/infra/issues
  license: GPL-2.0-or-later

  min_ansible_version: '2.1'

  platforms:
    - name: Debian
      versions: [11, 12]
    - name: Archlinux
      versions: [all]
    - name: macOS
      versions: [all]

  galaxy_tags:
    - dotfiles
    - dots
    - dotfile
    - directory
    - userdirs
    - config
    - shell

# Hard dependency: profile creates ~/.config/profile.d/ and ~/.profile that sources it.
# Without profile, 10-userdirs.sh has nowhere to land and XDG vars never reach the shell.
# NOTE: meta dependencies are only honoured when using the `roles:` key in a playbook.
# When using include_role in a tasks context, run marcus_grant.dotfiles.profile explicitly first.
dependencies:
  - role: marcus_grant.dotfiles.profile
