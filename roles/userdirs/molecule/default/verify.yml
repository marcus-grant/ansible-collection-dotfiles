---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Stat 10-userdirs.sh
      ansible.builtin.stat:
        path: /root/.config/profile.d/10-userdirs.sh
      register: userdirs_sh

    - name: Assert 10-userdirs.sh exists with mode 0640
      ansible.builtin.assert:
        that:
          - userdirs_sh.stat.exists
          - userdirs_sh.stat.mode == '0640'

    - name: Assert exactly 5 exported XDG vars
      ansible.builtin.shell:
        cmd: grep -c '^export XDG_' /root/.config/profile.d/10-userdirs.sh
      changed_when: false
      register: export_count

    - name: Assert export count is exactly 5
      ansible.builtin.assert:
        that: export_count.stdout | int == 5

    - name: Assert XDG_RUNTIME_DIR is absent (regression guard)
      ansible.builtin.shell:
        cmd: grep 'XDG_RUNTIME_DIR' /root/.config/profile.d/10-userdirs.sh
      changed_when: false
      register: runtime_dir_check
      failed_when: runtime_dir_check.rc == 0

    - name: Assert XDG_BIN_HOME is exported to child shell
      ansible.builtin.shell:
        cmd: bash -c '. /root/.config/profile.d/10-userdirs.sh && bash -c "echo \$XDG_BIN_HOME"'
      changed_when: false
      register: xdg_bin_home

    - name: Assert XDG_BIN_HOME is set
      ansible.builtin.assert:
        that: xdg_bin_home.stdout | length > 0

    - name: Assert XDG_DATA_HOME is exported to child shell
      ansible.builtin.shell:
        cmd: bash -c '. /root/.config/profile.d/10-userdirs.sh && bash -c "echo \$XDG_DATA_HOME"'
      changed_when: false
      register: xdg_data_home

    - name: Assert XDG_DATA_HOME is set
      ansible.builtin.assert:
        that: xdg_data_home.stdout | length > 0

    - name: Assert XDG_CONFIG_HOME is exported to child shell
      ansible.builtin.shell:
        cmd: bash -c '. /root/.config/profile.d/10-userdirs.sh && bash -c "echo \$XDG_CONFIG_HOME"'
      changed_when: false
      register: xdg_config_home

    - name: Assert XDG_CONFIG_HOME is set
      ansible.builtin.assert:
        that: xdg_config_home.stdout | length > 0

    - name: Assert XDG_CACHE_HOME is exported to child shell
      ansible.builtin.shell:
        cmd: bash -c '. /root/.config/profile.d/10-userdirs.sh && bash -c "echo \$XDG_CACHE_HOME"'
      changed_when: false
      register: xdg_cache_home

    - name: Assert XDG_CACHE_HOME is set
      ansible.builtin.assert:
        that: xdg_cache_home.stdout | length > 0

    - name: Assert XDG_STATE_HOME is exported to child shell
      ansible.builtin.shell:
        cmd: bash -c '. /root/.config/profile.d/10-userdirs.sh && bash -c "echo \$XDG_STATE_HOME"'
      changed_when: false
      register: xdg_state_home

    - name: Assert XDG_STATE_HOME is set
      ansible.builtin.assert:
        that: xdg_state_home.stdout | length > 0

    - name: Stat XDG_BIN_HOME directory
      ansible.builtin.stat:
        path: /root/.local/bin
      register: bin_dir

    - name: Assert XDG_BIN_HOME dir exists with mode 0750
      ansible.builtin.assert:
        that:
          - bin_dir.stat.exists
          - bin_dir.stat.isdir
          - bin_dir.stat.mode == '0750'

    - name: Stat XDG_DATA_HOME directory
      ansible.builtin.stat:
        path: /root/.local/share
      register: data_dir

    - name: Assert XDG_DATA_HOME dir exists with mode 0750
      ansible.builtin.assert:
        that:
          - data_dir.stat.exists
          - data_dir.stat.isdir
          - data_dir.stat.mode == '0750'

    - name: Stat XDG_CONFIG_HOME directory
      ansible.builtin.stat:
        path: /root/.config
      register: config_dir

    - name: Assert XDG_CONFIG_HOME dir exists with mode 0750
      ansible.builtin.assert:
        that:
          - config_dir.stat.exists
          - config_dir.stat.isdir
          - config_dir.stat.mode == '0750'

    - name: Stat XDG_CACHE_HOME directory
      ansible.builtin.stat:
        path: /root/.cache
      register: cache_dir

    - name: Assert XDG_CACHE_HOME dir exists with mode 0750
      ansible.builtin.assert:
        that:
          - cache_dir.stat.exists
          - cache_dir.stat.isdir
          - cache_dir.stat.mode == '0750'

    - name: Stat XDG_STATE_HOME directory
      ansible.builtin.stat:
        path: /root/.local/state
      register: state_dir

    - name: Assert XDG_STATE_HOME dir exists with mode 0750
      ansible.builtin.assert:
        that:
          - state_dir.stat.exists
          - state_dir.stat.isdir
          - state_dir.stat.mode == '0750'

    - name: Stat custom testdir
      ansible.builtin.stat:
        path: /root/testdir
      register: testdir

    - name: Assert custom testdir exists
      ansible.builtin.assert:
        that: testdir.stat.exists
