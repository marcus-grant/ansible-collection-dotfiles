---
galaxy_info:
  role_name: neovim
  author: marcus_grant
  description: |
    Install neovim and clone a git-controlled config repo to ~/.config/nvim
    via the dotfiles_git module. Supports package manager and appimage install methods.
    When using an SSH repo URL, the ssh_config role must have run first — dotfiles_git
    enforces this with a pre-flight check that fails fast rather than hanging.
  issue_tracker_url: https://github.com/marcus-grant/ansible-collection-dotfiles/issues
  license: GPL-2.0-or-later

  min_ansible_version: '2.1'

  platforms:
    - name: Debian
      versions:
        - bookworm
    - name: Archlinux
      versions:
        - all

  galaxy_tags:
    - dotfiles
    - dots
    - git
    - neovim
    - nvim
    - config
    - shell

dependencies: []
