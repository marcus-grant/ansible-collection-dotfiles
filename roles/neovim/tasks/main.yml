---
# tasks file for marcus_grant.dotfiles.neovim
- name: Resolve home directory for neovim_owner
  ansible.builtin.command: "getent passwd {{ neovim_owner }}"
  register: neovim_getent
  changed_when: false

- name: Set neovim_home fact
  ansible.builtin.set_fact:
    neovim_home: "{{ neovim_getent.stdout.split(':')[5] }}"

- name: Set neovim_appimage_dest_abs fact
  ansible.builtin.set_fact:
    neovim_appimage_dest_abs: "{{ neovim_appimage_dest | replace('~/', neovim_home + '/') }}"

- name: Include install tasks for neovim_install_method
  ansible.builtin.include_tasks: "install-{{ neovim_install_method }}.yml"

- name: Install extra packages
  become: true
  become_user: root
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ neovim_extra_packages }}"
  when: neovim_extra_packages | length > 0

- name: Ensure config parent directory exists
  become: true
  become_user: root
  ansible.builtin.file:
    path: "{{ neovim_home }}/.config"
    state: directory
    owner: "{{ neovim_owner }}"
    group: "{{ neovim_owner }}"
    mode: '0750'

- name: Clone neovim config repo
  become: true
  become_user: "{{ neovim_owner }}"
  marcus_grant.dotfiles.dotfiles_git:
    repo: "{{ neovim_git_repo }}"
    dest: "{{ neovim_home }}/.config/nvim"
    version: "{{ neovim_git_version }}"
    update: "{{ neovim_git_update }}"
    files: []
  when: neovim_git_repo | length > 0
