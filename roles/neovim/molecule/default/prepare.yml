---
- name: Prepare
  hosts: all
  gather_facts: true
  become: true
  become_user: root
  tasks:
    - name: Update apt cache (Debian)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install git
      ansible.builtin.package:
        name: git
        state: present

    - name: Create testuser with home
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true

    - name: Create fixture repo directory
      ansible.builtin.file:
        path: /opt/test-dots-nvim
        state: directory
        mode: '0755'

    - name: Init fixture git repo with minimal config
      ansible.builtin.shell: |
        git init /opt/test-dots-nvim
        git -C /opt/test-dots-nvim config user.email test@test.local
        git -C /opt/test-dots-nvim config user.name Test
        touch /opt/test-dots-nvim/init.lua
        git -C /opt/test-dots-nvim add .
        git -C /opt/test-dots-nvim commit -m "fixtures"
        git -C /opt/test-dots-nvim branch -M main
      args:
        creates: /opt/test-dots-nvim/.git

    - name: Own fixture repo by testuser so git clone as testuser succeeds
      ansible.builtin.file:
        path: /opt/test-dots-nvim
        owner: testuser
        group: testuser
        recurse: true
        state: directory
