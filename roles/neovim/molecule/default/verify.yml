---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Resolve testuser home directory
      ansible.builtin.command: getent passwd testuser
      register: neovim_verify_getent
      changed_when: false

    - name: Set neovim_verify_home fact
      ansible.builtin.set_fact:
        neovim_verify_home: "{{ neovim_verify_getent.stdout.split(':')[5] }}"

    - name: Check nvim version
      ansible.builtin.command: nvim --version
      register: neovim_verify_version
      changed_when: false

    - name: Assert nvim is installed
      ansible.builtin.assert:
        that: neovim_verify_version.rc == 0

    - name: Stat config dir
      ansible.builtin.stat:
        path: "{{ neovim_verify_home }}/.config/nvim"
      register: neovim_verify_dir

    - name: Assert config dir exists and is owned by testuser
      ansible.builtin.assert:
        that:
          - neovim_verify_dir.stat.exists
          - neovim_verify_dir.stat.isdir
          - neovim_verify_dir.stat.pw_name == 'testuser'

    - name: Stat init.lua
      ansible.builtin.stat:
        path: "{{ neovim_verify_home }}/.config/nvim/init.lua"
      register: neovim_verify_init

    - name: Assert init.lua present from fixture
      ansible.builtin.assert:
        that: neovim_verify_init.stat.exists

    - name: Check git remote of config dir
      become: true
      become_user: testuser
      ansible.builtin.command: >-
        git -C {{ neovim_verify_home }}/.config/nvim remote -v
      register: neovim_verify_remote
      changed_when: false

    - name: Assert git remote matches fixture repo
      ansible.builtin.assert:
        that: "'/opt/test-dots-nvim' in neovim_verify_remote.stdout"
