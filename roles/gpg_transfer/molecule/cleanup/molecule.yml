---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: controller
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
  - name: debian12
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
provisioner:
  name: ansible
verifier:
  name: ansible
scenario:
  # No idempotency step — the intentional failure path is not idempotent.
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
lint: |
  set -e
  yamllint .
  ansible-lint
