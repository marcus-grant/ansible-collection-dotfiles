---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: controller
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
  - name: debian12
    image: geerlingguy/docker-debian12-ansible
    pre_build_image: true
  - name: archlinux
    image: archlinux:latest
    dockerfile: Dockerfile-archlinux.j2
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: /usr/lib/systemd/systemd
provisioner:
  name: ansible
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
lint: |
  set -e
  yamllint .
  ansible-lint
