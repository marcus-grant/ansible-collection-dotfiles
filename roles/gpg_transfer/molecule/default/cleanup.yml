---
- name: Cleanup controller — remove disposable GNUPGHOME and fingerprint files
  hosts: controller
  gather_facts: false
  tasks:
    - name: Remove temp GNUPGHOME
      ansible.builtin.file:
        path: /tmp/molecule-gpg-transfer
        state: absent

    - name: Remove fingerprint files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/molecule-gpg-fp-a.txt
        - /tmp/molecule-gpg-fp-b.txt
        - /tmp/molecule-gpg-fp-c.txt
