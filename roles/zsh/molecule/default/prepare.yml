---
- name: Prepare
  hosts: all
  tasks:
    - name: Update apt cache on Debian family OSs
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install git
      ansible.builtin.package:
        name: git
        state: present

    - name: Create local test dotfiles repo directory
      ansible.builtin.file:
        path: /opt/test-dots-zsh
        state: directory
        mode: '0755'

    - name: Initialize local test dotfiles git repo
      ansible.builtin.command: git init /opt/test-dots-zsh
      args:
        creates: /opt/test-dots-zsh/.git

    - name: Create zsh dotfile fixtures
      ansible.builtin.copy:
        dest: "/opt/test-dots-zsh/{{ item }}"
        content: "# test {{ item }}\n"
        mode: '0644'
      loop:
        - rc.zsh
        - env.zsh
        - profile.zsh

    - name: Configure git identity for test repo commit
      ansible.builtin.command: "{{ item }}"
      loop:
        - git -C /opt/test-dots-zsh config user.email test@test.local
        - git -C /opt/test-dots-zsh config user.name Test
      changed_when: true

    - name: Commit fixture files to local test repo
      ansible.builtin.shell: |
        cd /opt/test-dots-zsh && git add . && git commit -m "fixtures"
      args:
        creates: /opt/test-dots-zsh/.git/refs/heads

    - name: Create testuser for zsh_owner tests
      ansible.builtin.user:
        name: testuser
        create_home: true
        shell: /bin/bash

    - name: Clone test repo as testuser-owned copy
      ansible.builtin.command: >
        git clone /opt/test-dots-zsh /opt/test-dots-zsh-testuser
      args:
        creates: /opt/test-dots-zsh-testuser/.git

    - name: Set testuser as owner of their repo copy
      ansible.builtin.file:
        path: /opt/test-dots-zsh-testuser
        owner: testuser
        group: testuser
        recurse: true
