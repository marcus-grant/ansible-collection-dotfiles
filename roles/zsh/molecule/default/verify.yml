---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert zsh is installed
      ansible.builtin.assert:
        that: ansible_facts.packages['zsh'] is defined

    - name: Register root user info
      ansible.builtin.user:
        name: root
      register: rootuser

    - name: Assert zsh is the default shell for root
      ansible.builtin.assert:
        that: rootuser.shell == '/usr/bin/zsh'

    - name: Stat zsh clone git directory
      ansible.builtin.stat:
        path: /root/.config/zsh/.git
      register: zsh_git

    - name: Assert zsh dotfiles repo is cloned
      ansible.builtin.assert:
        that: zsh_git.stat.exists

    - name: Get git remote of zsh dotfiles
      ansible.builtin.command: git -C /root/.config/zsh remote -v
      changed_when: false
      register: zsh_remote

    - name: Assert git remote points to local test repo
      ansible.builtin.assert:
        that: "'/opt/test-dots-zsh' in zsh_remote.stdout"

    - name: Read zshrc shim
      ansible.builtin.slurp:
        src: /root/.zshrc
      register: zshrc_content

    - name: Assert zshrc shim sources rc.zsh
      ansible.builtin.assert:
        that: "'rc.zsh' in (zshrc_content.content | b64decode)"

    - name: Assert zshenv ordering — profile sourced before env.zsh
      ansible.builtin.shell: |
        profile_line=$(grep -n 'source $HOME/.profile' /root/.zshenv | head -1 | cut -d: -f1)
        env_line=$(grep -n 'env.zsh' /root/.zshenv | head -1 | cut -d: -f1)
        [ "$profile_line" -lt "$env_line" ]
      changed_when: false

    - name: Read zprofile shim
      ansible.builtin.slurp:
        src: /root/.zprofile
      register: zprofile_content

    - name: Assert zprofile shim sources profile.zsh
      ansible.builtin.assert:
        that: "'profile.zsh' in (zprofile_content.content | b64decode)"
