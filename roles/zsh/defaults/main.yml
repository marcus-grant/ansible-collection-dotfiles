---
# defaults file for zsh
# shell settings
zsh_shell_as_default: false
zsh_default_shell_path: /usr/bin/zsh

# dotfile directory and files
zsh_config_dest: ~/.config/zsh
zsh_rc_file: rc.zsh
zsh_profile_file: profile.zsh
zsh_env_file: env.zsh
zsh_env_source_profile: true

# git repo settings
zsh_git_version: HEAD
zsh_git_force: false

# extra zsh packages to install
zsh_extra_packages: []
